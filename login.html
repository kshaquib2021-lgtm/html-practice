<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link
        href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic"
        rel="stylesheet" />

    <style>
        * {
            font-family: roboto
        }

        .card {
            /* border: 2px solid red; */
            width: 20%;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 3px 3px 5px 0 #000000a2;
            background-color: white;
        }

        body {
            background-attachment: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            
            background-image: linear-gradient(90deg , #f5f5f2,#c0c0e9,#e9cdcd);
            background-image: url(https://img.magnific.com/free-vector/green-monstera-leaves-with-copy-space-vector_53876-111532.jpg);
            background-size: cover;
        }

        .form-title {
            text-align: center;
        }

        .text-input {
            display: block;
            width: 100%;
            padding: 20px 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid black;

        }

        .btn-submit{

            background-color: blueviolet;
            color :white;
            padding: 15px;
            display: block;
            width: 100%;
            border-radius: 5px;
            border: none;
        }
        .link{
            display: block;
            color: blueviolet;
            text-decoration: none;
        }

        .forgot-link{

            text-align: center;
            margin-bottom: 30px;

        }

        .signup-link{
            text-align: center;
            margin-top: 30px;
        }
    </style>

</head>

<body>

    <div class="card">
        <h2 class="form-title">Login Form</h2>
        <form>
            <label for="">Email Address</label>
            <input type="email" class="text-input">

            <label for="">Password</label>
            <input type="password" class="text-input">
            <a href="#"class="link signup-link">forgot password</a>

            <button class="btn-submit">Submit</button>
           <a href="#"class="link signup-link">signup </a>
           
        </form>

    </div>

</body>

</html>

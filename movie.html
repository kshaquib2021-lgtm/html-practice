<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie ticket booking Form </title>
</head>

<body>
    <h1> Movie ticket booking form</h1>
    <form>
        <label for="">Full Name </label>
        <input type="text"minlength ="6">
        
        
        <br><br>

        <label for="">Email</label>
        <input type="email"Required>

        <br><br>

        <label for="">Phone Number</label>
        <input type="numerical"minimum length="10">

        <br><br>

        <label for="">Select Movie </label>
        <select>
            <Option>Obsession</Option>
            <Option>Welcome to jungle </Option>
            <Option> Coctail 2</Option>
            <option>Bhooth Bangla</option>
           
        </select>

        <br><br>
        

        <label for="date">Select Date:</label>
        <input type="date" id="date">

        <br><br>

        <label for=""> Time slot</label>
        <input type="time" id="time">

        <br><br>
        
        <label for="seats">Number of seats</label>
        <input type="number" id="seats" min="1" max="10">
        
        <br><br>
        
        <input type="submit" value="book ticket">
        <input type="reset" value="Reset">
    </form>
</body>

</html>

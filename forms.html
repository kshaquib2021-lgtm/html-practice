<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission <form">
            </form>
    </title>
</head>

<body>
    <h1>Student admission Form </h1>
    <form>
        <label for="">Student Name</label>
        <input type="text" required minlength="5">

        <br><br>

        <label for="">Student Email</label>
        <input type="email" required>

        <br><br>

        <label for="">Date of Birth</label>
        <input type="Date">

        <br><br>

        <label for="">Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female

        <br><br>
        <label for="">Select course</label>

        <select>
            <option>MERN STACK DEVELOPERS</option>
            <option>DATA ANALYTICS</option>
            <option>DATA SCIENCE</option>
            <option>ARTIFICIAL INTELLIGENCE</option>
        </select>

        
        <br><br>

        <label for="">Select College</label>
        <input type="text" list="college">
        <datalist id="college">
            <option>Amity college</option>
            <option>MGIMT</option>
            <option>BIET</option>
            <option>SRMCEM</option>
        </datalist>

        <br><br>

        <label for="">Adress</label>
        <textarea rows="4" cols="20"></textarea>

        <br><br>

        <input type="checkbox" id="terms">
        <label for="terms">I Accept terms and conditions</label>

        <br><br>
        <details>
            <summary>View terms and conditions</summary>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Iure illum ipsum fugit atque voluptate
                similique minima repellendus, amet quod ullam ducimus, optio ratione sed odit facilis id quaerat minus
                qui!</p>
        </details>

        <br>

        <button>Submit</button>

    </form>
</body>

</html>
